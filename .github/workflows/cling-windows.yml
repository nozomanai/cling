name: Cling Build and Test (Windows)

on:
  push:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout LLVM
        uses: actions/checkout@v6
        with:
          repository: root-project/llvm-project
          path: llvm
          ref: cling-latest
          fetch-depth: 1

      - name: Checkout Cling
        uses: actions/checkout@v6
        with:
          repository: root-project/cling
          path: cling
          fetch-depth: 1

      - name: Prepare build directory
        run: mkdir build

      - name: Configure
        working-directory: build
        shell: pwsh
        run: |
          cmake ..\llvm\llvm\ `
            -DLLVM_EXTERNAL_PROJECTS=cling `
            -DLLVM_EXTERNAL_CLING_SOURCE_DIR=..\cling\ `
            -DLLVM_ENABLE_PROJECTS="clang" `
            -DLLVM_TARGETS_TO_BUILD="host;NVPTX" `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLLVM_ENABLE_ASSERTIONS=ON

      - name: Build
        working-directory: build
        run: cmake --build . --config RelWithDebInfo --parallel 4 --target cling

      # - name: Test
      #   working-directory: build
      #   run: cmake --build . --config RelWithDebInfo --target check-cling

      - name: Install
        working-directory: build
        run: cmake --install . --prefix ../install --config RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cling-windows
          path: install/
